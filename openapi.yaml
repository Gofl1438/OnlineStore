openapi: 3.0.4
info:
  title: Интернет-магазин
  description: 'REST API интернет-магазина, предоставляющее функционал управления товарами, корзиной покупок и оформлением заказов'
  version: 1.0.0
tags:
  - name: ProductController
    description: Работа с товаром
  - name: CartController 
    description: Работа с корзиной
  - name: OrderController
    description: Работа с заказами
paths:
  /products:
    get:
      summary: Получить все товары
      tags:
        - ProductController
      operationId: getAllProducts
      responses:
        '200':
          description: Список товаров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'
    post:
      summary: Создать товар
      tags:
        - ProductController
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductCreate'
      responses:
        '201':
          description: Товар создан
  '/products/{id}':
    get:
      summary: Получить товар по id
      tags:
        - ProductController
      operationId: getProductById
      parameters:
        - name: id
          in: path
          required: true
          description: ID уникального товара
          schema:
            type: integer
      responses:
        '200':
          description: Товар найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Товар не найден
  '/carts/{cartId}':
    get:
      summary: Получить корзину по id
      tags:
        - CartController
      operationId: getCartById
      responses:
        '200':
          description: Корзина найдена
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cart'
        '404':
          description: Корзина не найдена
      parameters:
        - schema:
            type: integer
          description: ID уникальной корзины
          name: cartId
          in: path
          required: true
  '/carts/{cartId}/items':
    post:
      summary: Добавить в конкретную корзину товар
      operationId: addItemToCart
      tags:
        - CartController
      parameters:
        - schema:
            type: integer
          name: cartId
          description: ID уникальной корзины
          in: path
          required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartItem'
      responses:
        '200':
          description: Товар добавлен
  '/carts/{cartId}/items/{productId}':
    delete:
      summary: Удалить товар из корзины
      operationId: removeItemFromCart
      tags:
        - CartController
      parameters:
        - name: cartId
          in: path
          required: true
          description: ID уникальной корзины
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          description: ID уникального товара
          schema:
            type: integer
      responses:
        '204':
          description: Товар удалён
        '404':
          description: Не найден товар или корзина
  /orders:
    get:
      summary: Получить все заказы
      operationId: getAllOrders
      tags:
        - OrderController
      responses:
        '200':
          description: Список заказов
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Order'
    post:
      summary: Создать заказ
      operationId: createOrder
      tags:
        - OrderController
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderCreate'
      responses:
        '201':
          description: Заказ создан
  '/orders/{id}':
    get:
      summary: Получить заказ по id
      operationId: getOrderById
      tags:
        - OrderController
      parameters:
        - schema:
            type: integer
          name: id
          in: path
          required: true
      responses:
        '200':
          description: Заказ найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Order'
        '404':
          description: Заказ не найден
components:
  schemas:
    Product:
      type: object
      properties:
        productId:
          type: integer
          readOnly: true
        name:
          type: string
          minLength: 1
          maxLength: 100
        price:
          type: number
          minimum: 0
          maximum: 100000
          multipleOf: 0.01
    ProductCreate:
      title: ProductCreate
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        price:
          type: number
          x-stoplight:
            id: w6ghhvu1d7loj
          minimum: 0
          maximum: 100000
          multipleOf: 0.01
    Cart:
      title: Cart
      type: object
      properties:
        cartId:
          type: integer
          readOnly: true
        items:
          type: array
          minItems: 0
          maxItems: 1000
          items:
            $ref: '#/components/schemas/CartItem'
    CartItem:
      title: CartItem
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          maximum: 100
          minimum: 1
    Order:
      title: Order
      type: object
      properties:
        orderId:
          type: integer
          readOnly: true
        userId:
          type: integer
          x-stoplight:
            id: 23ph04pik5rn6
        items:
          type: array
          x-stoplight:
            id: q0ydfr68tnvol
          items:
            $ref: '#/components/schemas/OrderItem'
        totalPrice:
          type: number
          x-stoplight:
            id: tby1lex4y5ly4
          minimum: 1
          multipleOf: 0.01
          readOnly: true
        status:
          x-stoplight:
            id: 19imnvajqh80e
          enum:
            - ожидает обработки
            - оплачен
            - отправлен
            - доставлен
            - отменён
    OrderCreate:
      title: OrderCreate
      type: object
      properties:
        items:
          type: array
          x-stoplight:
            id: kbqjzvenjihtj
          items:
            $ref: '#/components/schemas/OrderItemCreate'
    OrderItem:
      title: OrderItem
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          x-stoplight:
            id: 21ex9rwe9tx51
          minimum: 1
          maximum: 1000
        price:
          type: number
          x-stoplight:
            id: oq7yfej2syt02
          minimum: 0
          multipleOf: 0.01
    OrderItemCreate:
      title: OrderItemCreate
      type: object
      properties:
        productId:
          type: integer
        quantity:
          type: integer
          x-stoplight:
            id: hxmqwhzz8cubd
          minimum: 1
          maximum: 1000
